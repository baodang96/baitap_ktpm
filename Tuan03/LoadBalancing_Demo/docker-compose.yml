version: "3.9"

services:
  mariadb:
    image: mariadb:11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demo_db
    ports:
      - "3306:3306"

  app1:
    build: ./LoadBalancing_Demo
    container_name: app1
    depends_on:
      - mariadb

  app2:
    build: ./LoadBalancing_Demo
    container_name: app2
    depends_on:
      - mariadb

  nginx:
    image: nginx:alpine
    container_name: nginx_lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx:/etc/nginx
    depends_on:
      - app1
      - app2
